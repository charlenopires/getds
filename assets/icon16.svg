<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <defs>
    <linearGradient id="bg16" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1033"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="16" height="16" rx="3.5" fill="url(#bg16)"/>

  <!-- Gem — center 8,8 — at 16px keep it clean, no filter -->
  <!-- Points: top(8,2) right(14,8) bottom(8,14) left(2,8) -->
  <polygon points="8,2 2,8 8,8"  fill="#8b84ff"/>
  <polygon points="8,2 14,8 8,8" fill="#4f49c2"/>
  <polygon points="2,8 8,14 8,8" fill="#34d399"/>
  <polygon points="14,8 8,14 8,8" fill="#1da876"/>

  <!-- Minimal facet dividers -->
  <line x1="8" y1="2" x2="8" y2="14" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>
  <line x1="2" y1="8" x2="14" y2="8" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>
</svg>
