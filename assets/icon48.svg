<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bg48" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1033"/>
    </linearGradient>
    <radialGradient id="glow48" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="rgba(108,99,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(108,99,255,0)"/>
    </radialGradient>
    <filter id="shadow48" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="rgba(108,99,255,0.5)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="url(#bg48)"/>
  <rect width="48" height="48" rx="10" fill="url(#glow48)"/>
  <!-- Border accent -->
  <rect x="0.5" y="0.5" width="47" height="47" rx="9.5" fill="none"
        stroke="rgba(108,99,255,0.35)" stroke-width="1"/>

  <!-- Gem — center 24,24 -->
  <!-- Points: top(24,6) right(41,24) bottom(24,42) left(7,24) -->
  <g filter="url(#shadow48)">
    <polygon points="24,6 7,24 24,24" fill="#8b84ff"/>
    <polygon points="24,6 41,24 24,24" fill="#4f49c2"/>
    <polygon points="7,24 24,42 24,24" fill="#34d399"/>
    <polygon points="41,24 24,42 24,24" fill="#1da876"/>
  </g>

  <!-- Facet lines -->
  <line x1="24" y1="6" x2="24" y2="42" stroke="rgba(0,0,0,0.25)" stroke-width="0.75"/>
  <line x1="7" y1="24" x2="41" y2="24" stroke="rgba(0,0,0,0.25)" stroke-width="0.75"/>

  <!-- Shine -->
  <polygon points="24,6 15,20 24,20" fill="rgba(255,255,255,0.2)"/>
</svg>
